<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sober Test - Multi Jump</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #dot { 
            position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, #ff0000, #550000); 
            border-radius: 50%; display: none; box-shadow: 0 0 30px #f00; z-index: 100;
        }
        #ui { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        button { padding: 20px 40px; font-size: 24px; cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 10px; }
        #status { font-size: 20px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div id="ui">
        <button id="btn">Начать тест (5 прыжков)</button>
        <div id="status">Держите голову неподвижно, следите только глазами</div>
    </div>
    <div id="dot"></div>

    <script>
        const btn = document.getElementById('btn');
        const dot = document.getElementById('dot');
        const status = document.getElementById('status');
        
        let recorder;
        let chunks = [];
        let jumps = [];
        let startTime = 0;

        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } }).then(stream => {
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                status.innerText = "Идет глубокий анализ видео...";
                const blob = new Blob(chunks, { type: 'video/webm' });
                const fd = new FormData();
                fd.append('video', blob);
                fd.append('jumps_json', JSON.stringify(jumps));

                try {
                    const res = await fetch('http://localhost:8000/analyze_reaction', { method: 'POST', body: fd });
                    const data = await res.json();
                    if(data.status === 'success') {
                        status.innerHTML = `Тест завершен!<br>Средняя реакция: <span style="color:#0f0">${data.average_ms} мс</span><br>Успешных замеров: ${data.count}/5`;
                    } else {
                        status.innerText = data.message;
                    }
                } catch(e) { status.innerText = "Ошибка сервера"; }
                btn.style.display = 'block';
            };
        });

        btn.onclick = async () => {
            if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
            btn.style.display = 'none';
            chunks = [];
            jumps = [];
            
            recorder.start();
            startTime = performance.now();
            status.innerText = "Внимание...";

            // Цикл из 5 прыжков
            for(let i = 0; i < 5; i++) {
                await new Promise(r => setTimeout(r, 1500 + Math.random() * 1500));
                
                const x = 10 + Math.random() * 80;
                const y = 10 + Math.random() * 80;
                dot.style.left = x + '%';
                dot.style.top = y + '%';
                dot.style.display = 'block';
                
                jumps.push(performance.now() - startTime);
                
                await new Promise(r => setTimeout(r, 800));
                dot.style.display = 'none';
                status.innerText = `Прыжок ${i+1} из 5`;
            }

            recorder.stop();
            if (document.exitFullscreen) document.exitFullscreen();
        };
    </script>
</body>
</html>
