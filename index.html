<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sober Test Pro - Eye Tracking</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #dot { 
            position: absolute; 
            width: 45px; 
            height: 45px; 
            background: #fff; 
            border-radius: 50%; 
            display: none; 
            box-shadow: 0 0 30px #fff; 
            z-index: 100;
            transition: background 0.3s;
        }
        #ui { 
            text-align: center; 
            background: rgba(20, 20, 20, 0.9); 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid #333;
            max-width: 500px;
        }
        h1 { margin-top: 0; color: #007bff; }
        #status { font-size: 18px; margin-bottom: 30px; color: #ccc; min-height: 50px; }
        button { 
            padding: 18px 36px; 
            font-size: 20px; 
            font-weight: bold;
            cursor: pointer; 
            background: #28a745; 
            color: #fff; 
            border: none; 
            border-radius: 10px;
            transition: transform 0.2s, background 0.2s;
        }
        button:hover { background: #218838; transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        .result-val { font-size: 24px; color: #ffc107; font-weight: bold; }
        #videoLink { display: block; margin-top: 20px; color: #17a2b8; text-decoration: none; font-weight: bold; }
        #videoLink:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Sober Test v3.0</h1>
        <div id="status">Разрешите доступ к камере и расположите лицо по центру экрана.</div>
        <button id="startBtn">НАЧАТЬ ТЕСТ</button>
    </div>

    <div id="dot"></div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const dot = document.getElementById('dot');
        const status = document.getElementById('status');
        const ui = document.getElementById('ui');
        
        let recorder, chunks = [], jumps = [], startTime;

        // Инициализация камеры с настройками для высокого FPS и качества
        navigator.mediaDevices.getUserMedia({ 
            video: { 
                width: 1280, 
                height: 720, 
                frameRate: { ideal: 30 } 
            } 
        }).then(stream => {
            // Настройка рекордера: высокий битрейт важен для четкости векторов
            recorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp8',
                videoBitsPerSecond: 6000000 // 6 Mbps
            });

            recorder.ondataavailable = e => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            recorder.onstop = async () => {
                status.innerHTML = "📡 Передача данных на сервер...<br>Обработка векторов и расчет нистагма.";
                
                const videoBlob = new Blob(chunks, { type: 'video/webm' });
                const formData = new FormData();
                formData.append('video', videoBlob, 'test.webm');
                formData.append('jumps_json', JSON.stringify(jumps));

                try {
                    const response = await fetch('http://127.0.0.1:8000/analyze_reaction', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    if (data.status === 'success') {
                        status.innerHTML = `
                            <p>Реакция: <span class="result-val">${data.average_ms} мс</span></p>
                            <p>Нистагм (дрожание): <span class="result-val">${data.nystagmus_index}</span></p>
                            <p>Успешных тестов: ${data.count} из 5</p>
                            <a id="videoLink" href="http://127.0.0.1:8000${data.video_url}" target="_blank">📥 СКАЧАТЬ ВИДЕО РАЗБОРА</a>
                        `;
                    } else {
                        status.innerText = "Ошибка: " + data.message;
                    }
                } catch (err) {
                    status.innerText = "Ошибка сервера. Убедитесь, что api.py запущен.";
                }
                ui.style.display = 'block';
            };
        }).catch(err => {
            status.innerText = "Камера не найдена или доступ запрещен.";
            startBtn.disabled = true;
        });

        startBtn.onclick = async () => {
            ui.style.display = 'none';
            chunks = []; 
            jumps = [];
            
            recorder.start();
            startTime = performance.now();

            // --- 1. ФАЗА КАЛИБРОВКИ ---
            // Пользователь должен смотреть строго в центр 2 секунды
            dot.style.background = "yellow";
            dot.style.left = "50%";
            dot.style.top = "50%";
            dot.style.transform = "translate(-50%, -50%)";
            dot.style.display = "block";
            
            // Ждем 2.5 секунды для накопления кадров калибровки
            await new Promise(r => setTimeout(r, 2500));
            
            dot.style.background = "red";
            dot.style.transform = "none"; // Убираем центрирование для прыжков

            // --- 2. ФАЗА ТЕСТА (5 прыжков) ---
            for(let i = 0; i < 5; i++) {
                // Случайная пауза перед прыжком
                await new Promise(r => setTimeout(r, 1200 + Math.random() * 1000));
                
                // Координаты: сильно разносим по краям (10-20% или 80-90%)
                const xPct = Math.random() > 0.5 ? (10 + Math.random() * 10) : (80 + Math.random() * 10);
                const yPct = 20 + Math.random() * 60;
                
                dot.style.left = xPct + '%';
                dot.style.top = yPct + '%';
                
                // Логируем время и координаты (теперь передаем X и Y для отрисовки целей)
                jumps.push({ 
                    t: performance.now() - startTime, 
                    x: xPct / 100, 
                    y: yPct / 100 
                });

                // Ждем фиксации взгляда
                await new Promise(r => setTimeout(r, 900));
            }

            // Небольшая пауза после последнего прыжка и стоп
            setTimeout(() => {
                dot.style.display = "none";
                recorder.stop();
            }, 300);
        };
    </script>
</body>
</html>
